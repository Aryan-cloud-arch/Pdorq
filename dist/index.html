uestion:"How do I place an order?",answer:"Select your target platform, choose the specific service (e.g., account takedown, video removal), enter the target URL or username, select urgency level, and submit. You can pay using your wallet balance, which you can top up via crypto, card, UPI, or bank transfer."},{category:"Orders",question:"What is TAT (Turnaround Time)?",answer:"TAT is the estimated time to complete your order. Standard orders follow regular TAT (e.g., 24-48h). Priority orders are 1.5x faster, and Urgent orders are processed at 2x speed with immediate attention from our senior team."},{category:"Orders",question:"Can I track my order status?",answer:'Yes! Once logged in, go to "My Orders" in your dashboard. You can see real-time status updates, estimated completion time, and complete history of each order. You will also receive notifications for status changes.'},{category:"Orders",question:"What information do I need to provide?",answer:"You need to provide the target URL or username, a brief description of why takedown is needed, and your contact information for updates. The more details you provide, the faster we can process your request."},{category:"Payments",question:"What payment methods do you accept?",answer:"We accept Cryptocurrency (BTC, ETH, USDT - with 5% bonus!), Credit/Debit Cards (Visa, Mastercard), UPI (for Indian users), and Bank Transfers. All payments are secure and encrypted."},{category:"Payments",question:"How does the wallet system work?",answer:"Add funds to your wallet and use the balance for orders. Benefits include: instant order processing (no payment delays), bonus credits on deposits ($50+ gets bonuses), and easy refunds directly to wallet if needed."},{category:"Payments",question:"Do you offer discounts?",answer:"Yes! All our services have significant discounts (60-92% off). We also have promo codes for additional savings. First-time users get $2 free credits on signup, and crypto payments receive an extra 5% bonus."},{category:"Payments",question:"What is your refund policy?",answer:"We offer full refunds if we cannot complete your takedown within the extended timeframe. Partial refunds are available for partial completions. Refunds are processed to your wallet within 24 hours. See our Refund Policy for details."},{category:"Technical",question:"What is your success rate?",answer:"Our overall success rate is 99.2%. Success rates vary slightly by platform: Telegram (99.5%), Instagram (98.8%), YouTube (99.1%), TikTok (98.5%). We only accept orders we are confident we can complete."},{category:"Technical",question:"What if the content reappears after takedown?",answer:"We offer a 30-day guarantee. If the same content reappears from the same source within 30 days, we will take it down again at no extra charge. Simply contact support with your original order ID."},{category:"Technical",question:"Do you guarantee 100% success?",answer:"While we have a 99.2% success rate, we cannot guarantee 100% success due to factors outside our control. If we fail, you receive a full refund. We are transparent about our capabilities and will inform you if your request has low success probability."},{category:"Technical",question:"How do you perform takedowns?",answer:"We use legitimate reporting mechanisms provided by each platform. This includes filing DMCA/copyright claims, reporting policy violations, trademark infringement reports, and coordinating with platform trust & safety teams through established channels."},{category:"Privacy",question:"Is my information kept confidential?",answer:"Absolutely. We use end-to-end encryption, store minimal data, and never share client information. Your identity is protected throughout the process. We operate on a strict need-to-know basis internally."},{category:"Privacy",question:"Do you keep logs of my orders?",answer:"We maintain order records for service delivery and your reference. However, we automatically purge detailed logs after 90 days. You can re
